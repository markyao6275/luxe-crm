name: Deploy

# Recurring: apply any new Supabase migrations, then build and deploy the
# current commit to Vercel production. Migrations run first — if they
# fail, the Vercel deploy is skipped so app code doesn't ship against an
# older schema.

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Supabase
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      # Vercel
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply pending migrations
        run: |
          supabase link --project-ref "$PROJECT_REF"
          supabase db push --password "$DB_PASSWORD"

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project config
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
