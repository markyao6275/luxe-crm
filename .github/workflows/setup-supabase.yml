name: Setup Supabase

# One-time: link the local migrations to the hosted Supabase project,
# push every migration, and apply seed.sql. Safe to re-run — db push is
# idempotent and seed.sql should use ON CONFLICT DO NOTHING.

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Apply migrations
        run: supabase db push --password "$DB_PASSWORD"

      - name: Apply seed.sql
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          PGSSLMODE: require
        run: |
          psql \
            -h "db.${PROJECT_REF}.supabase.co" \
            -p 5432 \
            -U postgres \
            -d postgres \
            -v ON_ERROR_STOP=1 \
            -f supabase/seed.sql
